<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | NexCart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            overflow:hidden;
            position:relative;
        }

        /* Floating circles */

        body::before,
        body::after{
            content:'';
            position:absolute;
            border-radius:50%;
            filter:blur(30px);
            opacity:.5;
        }

        body::before{
            width:250px;
            height:250px;
            background:#22c55e;
            top:-80px;
            left:-80px;
        }

        body::after{
            width:300px;
            height:300px;
            background:#3b82f6;
            bottom:-100px;
            right:-100px;
        }

        .success-card{

            width:430px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:25px;
            padding:45px;
            text-align:center;
            color:white;
            box-shadow:0 20px 50px rgba(0,0,0,.35);

            animation:float 3s ease-in-out infinite;

        }

        @keyframes float{

            0%{transform:translateY(0);}
            50%{transform:translateY(-8px);}
            100%{transform:translateY(0);}

        }

        .icon{

            width:110px;
            height:110px;
            background:linear-gradient(135deg,#22c55e,#16a34a);
            border-radius:50%;
            margin:auto;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:60px;
            color:white;

            box-shadow:0 0 30px rgba(34,197,94,.7);

            animation:pop .7s ease;

        }

        @keyframes pop{

            0%{
                transform:scale(0);
            }

            70%{
                transform:scale(1.15);
            }

            100%{
                transform:scale(1);
            }

        }

        h1{

            margin-top:25px;
            font-weight:700;

        }

        p{

            margin-top:15px;
            color:#e5e7eb;
            line-height:1.7;

        }

        .btn-home{

            margin-top:30px;
            background:linear-gradient(90deg,#22c55e,#16a34a);
            color:white;
            border:none;
            border-radius:50px;
            padding:14px 35px;
            font-weight:600;
            transition:.4s;
            text-decoration:none;
            display:inline-block;

        }

        .btn-home:hover{

            transform:translateY(-3px);
            color:white;
            box-shadow:0 12px 25px rgba(34,197,94,.5);

        }

        .small-text{

            margin-top:18px;
            font-size:14px;
            color:#cbd5e1;

        }

    </style>

</head>

<body>

<div class="success-card">

    <div class="icon">
        ✓
    </div>

    <h1>Thank You!</h1>

    <p>

        Your message has been sent successfully.

        <br><br>

        Our team has received your request and will contact you shortly.

    </p>

    <a href="/" class="btn-home">
        🏠 Back to Home
    </a>

    <div class="small-text">
        Thank you for choosing <strong>NexCart</strong>.
    </div>

</div>

</body>
</html>
