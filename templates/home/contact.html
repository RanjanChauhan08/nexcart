{% extends "base.html" %}

{% block title %}Contact{% endblock title %}

{% block body %}

<div class="container d-flex justify-content-center mt-5">
     
    <div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

        <h2 class="text-center mb-4">Contact Us</h2>

        <form action="/ContactSend" method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" name="name" placeholder="Enter your Name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" name="phnumber" placeholder="Enter phone number">
            </div>

            <div class="mb-3">
            <label class="form-label">Reason For Contacting</label>

            <textarea class="form-control"
                    rows="4"
                    maxlength="500"
                    name="reason_for_contacting"
                    placeholder="Write your reason here (max 500 letters)">
            </textarea>

            <div class="form-text">
                Maximum 500 letters allowed
            </div>

            <div class="d-grid">
                <button class="btn btn-dark">Submit</button>
            </div>
        </div>
        
        </form>

    </div>

</div>

{% endblock body %}
